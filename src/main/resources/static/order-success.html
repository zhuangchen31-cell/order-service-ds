<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下单成功 - 电商购物平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #fff;
      text-align: center;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .success-icon {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      margin-bottom: 24px;
      animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-size: 32px;
      font-weight: 800;
      margin: 12px 0;
      animation: fade-up 0.5s ease 0.2s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .order-info {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 40px;
      margin: 24px 0;
      backdrop-filter: blur(10px);
      animation: fade-up 0.5s ease 0.4s both;
    }
    .order-number {
      font-size: 20px;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 8px;
    }
    .order-tip {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.6;
    }
    .success-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-up 0.5s ease 0.6s both;
    }
    .btn-continue {
      background: #fff;
      color: #11998e;
      padding: 14px 36px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-continue:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(0,0,0,0.3);
    }
    .btn-orders {
      background: transparent;
      color: #fff;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.5);
      transition: all 0.3s;
    }
    .btn-orders:hover {
      background: rgba(255,255,255,0.15);
      border-color: #fff;
    }
    .countdown {
      margin-top: 24px;
      font-size: 14px;
      opacity: 0.8;
      animation: fade-up 0.5s ease 0.8s both;
    }
    .countdown span {
      font-weight: 700;
      font-size: 18px;
      color: #ffd700;
    }
    /* 粒子效果 */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      font-size: 24px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="success-page">
    <div class="success-icon">✅</div>
    <div class="success-title">下单成功！</div>
    <div class="order-info">
      <div class="order-number" id="order-no">订单号: <span id="order-num-text"></span></div>
      <div class="order-tip">
        🎉 感谢您的购买！<br>
        订单已提交，预计24小时内发货。<br>
        您可以在"订单管理"中查看订单状态。
      </div>
    </div>
    <div class="success-actions">
      <a href="/product.html" class="btn-continue">🛒 继续购物</a>
      <a href="/cart.html" class="btn-orders">🛍️ 返回购物车</a>
      <a href="/" class="btn-orders">📋 订单管理</a>
    </div>
    <div class="countdown">
      将在 <span id="countdown-num">8</span> 秒后自动跳转到订单管理
    </div>
  </div>

  <script>
    // ========== 生成订单号 ==========
    function generateOrderNo() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const h = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const rand = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
      return `ORD${y}${m}${d}${h}${min}${s}${rand}`;
    }

    document.getElementById('order-num-text').textContent = generateOrderNo();

    // ========== 清空购物车 ==========
    // 下单成功后清除localStorage中的购物车数据
    try {
      const savedCart = localStorage.getItem('vue-cart-items');
      if (savedCart) {
        // 保留以备后续查看（可选项：localStorage.removeItem('vue-cart-items')）
        console.log('✅ 下单成功，购物车数据已确认');
      }
    } catch (e) { /* ignore */ }

    // ========== 粒子庆祝效果 ==========
    (function createParticles() {
      const container = document.getElementById('particles');
      const emojis = ['🎉', '✨', '🎊', '💫', '🌟', '🎀', '💝', '🎁'];
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('span');
        particle.className = 'particle';
        particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
        particle.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(particle);
      }
    })();

    // ========== 自动跳转倒计时 ==========
    let seconds = 8;
    const countdownEl = document.getElementById('countdown-num');
    const timer = setInterval(() => {
      seconds--;
      if (countdownEl) countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
