<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商购物平台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <section id="auth-view" class="auth-view">
    <form id="login-form" class="auth-panel">
      <h1>电商购物平台</h1>
      <p>登录后浏览商品、管理购物车并查询订单</p>
      <label>用户名<input id="login-username" autocomplete="username" value="test"></label>
      <label>密码<input id="login-password" type="password" autocomplete="current-password" value="123456"></label>
      <button type="submit" class="primary">登录</button>
      <button type="button" id="show-register" class="ghost">注册新账号</button>
    </form>
    <form id="register-form" class="auth-panel hidden">
      <h1>创建账号</h1>
      <p>注册后自动登录</p>
      <label>用户名<input id="reg-username" autocomplete="username"></label>
      <label>密码<input id="reg-password" type="password" autocomplete="new-password"></label>
      <label>手机号<input id="reg-phone"></label>
      <label>邮箱<input id="reg-email" type="email"></label>
      <button type="submit" class="primary">注册</button>
      <button type="button" id="show-login" class="ghost">返回登录</button>
    </form>
  </section>

  <section id="main-view" class="hidden">
    <header class="topbar">
      <div class="brand" onclick="App.navigate('products')">电商购物平台</div>
      <nav>
        <button data-route="products">商品</button>
        <button data-route="cart">购物车 <span id="cart-badge">0</span></button>
        <button data-route="orders">订单</button>
      </nav>
      <div class="user-box">
        <span id="current-user">用户</span>
        <button id="logout-btn" class="ghost small">退出</button>
      </div>
    </header>

    <main class="layout">
      <section id="page-products" class="page">
        <div class="section-head">
          <div>
            <h2>商品列表</h2>
            <p>支持分页查询和分类筛选，每次翻页都会请求后端接口</p>
          </div>
          <div class="filters">
            <input id="product-keyword" placeholder="搜索商品">
            <select id="product-category">
              <option value="">全部分类</option>
              <option value="数码">数码</option>
              <option value="箱包">箱包</option>
              <option value="家电">家电</option>
              <option value="家居">家居</option>
              <option value="运动">运动</option>
            </select>
            <button id="product-search" class="primary compact">查询</button>
          </div>
        </div>
        <div id="product-grid" class="product-grid"></div>
        <div class="pagination">
          <span id="product-page-info"></span>
          <div>
            <button id="product-prev" class="ghost small">上一页</button>
            <button id="product-next" class="ghost small">下一页</button>
          </div>
        </div>
      </section>

      <section id="page-cart" class="page hidden">
        <div class="section-head">
          <div>
            <h2>购物车</h2>
            <p>全局状态由 cartStore.js 维护，模拟 Pinia 的集中式状态管理</p>
          </div>
          <button id="clear-cart" class="danger compact">清空购物车</button>
        </div>
        <div id="cart-list" class="cart-list"></div>
        <div class="checkout-bar">
          <span>合计：<strong id="cart-total">¥0.00</strong></span>
          <button id="checkout-btn" class="primary compact">提交订单</button>
        </div>
      </section>

      <section id="page-orders" class="page hidden">
        <div class="section-head">
          <div>
            <h2>订单列表</h2>
            <p>登录 Token 验证通过后查询当前平台订单</p>
          </div>
          <button id="refresh-orders" class="primary compact">刷新</button>
        </div>
        <div class="stats">
          <span>总订单 <strong id="stat-total">0</strong></span>
          <span>待支付 <strong id="stat-pending">0</strong></span>
          <span>已支付 <strong id="stat-paid">0</strong></span>
          <span>今日 <strong id="stat-today">0</strong></span>
        </div>
        <div class="table-card">
          <table>
            <thead><tr><th>订单号</th><th>用户ID</th><th>金额</th><th>状态</th><th>收货人</th><th>电话</th><th>时间</th></tr></thead>
            <tbody id="order-body"></tbody>
          </table>
        </div>
      </section>

      <section id="page-success" class="page result-page hidden">
        <h2>下单成功</h2>
        <p id="success-order-no">订单已创建</p>
        <button class="primary compact" data-route="orders">查看订单</button>
      </section>

      <section id="page-404" class="page result-page hidden">
        <h2>404</h2>
        <p>页面不存在，请返回商品列表继续浏览。</p>
        <button class="primary compact" data-route="products">返回商品</button>
      </section>
    </main>
  </section>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/request.js"></script>
  <script src="/js/cartStore.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
